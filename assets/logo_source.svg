<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="gold3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="blue3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background square with gradient -->
  <rect width="1024" height="1024" fill="url(#bg3)" rx="180"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.25"/>
    <stop offset="100%" style="stop-color:#0a0f1e;stop-opacity:0"/>
  </radialGradient>
  <rect width="1024" height="1024" fill="url(#glow)" rx="180"/>

  <!-- Outer ring -->
  <circle cx="512" cy="512" r="390" fill="none" stroke="url(#gold3)" stroke-width="6" opacity="0.4"/>
  <circle cx="512" cy="512" r="350" fill="none" stroke="url(#gold3)" stroke-width="2.5" opacity="0.2"/>

  <!-- Hexagon centered -->
  <polygon
    points="512,230 686,330 686,530 512,630 338,530 338,330"
    fill="none"
    stroke="#f59e0b"
    stroke-width="16"
    stroke-linejoin="round"
  />

  <!-- Inner glow fill -->
  <polygon
    points="512,230 686,330 686,530 512,630 338,530 338,330"
    fill="#2563eb"
    opacity="0.08"
  />

  <!-- P letter -->
  <text
    x="512"
    y="570"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="310"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    opacity="0.97"
  >P</text>

  <!-- PRO badge -->
  <rect x="362" y="670" width="300" height="72" rx="18" fill="url(#gold3)"/>
  <text
    x="512"
    y="719"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="40"
    font-weight="900"
    fill="#0a0f1e"
    text-anchor="middle"
    letter-spacing="10"
  >PRO</text>
</svg>
